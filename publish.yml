site:
  title: Neo4j Docs
  url: https://neo4j.com/docs
  start_page: getting-started:ROOT:index.adoc

content:
  sources:
  - url: ./
    branches: ['HEAD']
    exclude:
    - '!**/_includes/*'
    - '!**/readme.adoc'
    - '!**/README.adoc'
ui:
  bundle:
    url: https://static-content.neo4j.com/build/ui-bundle-latest.zip
    snapshot: true
  output_dir: /assets

urls:
  html_extension_style: indexify

antora:
  extensions:
  - "@neo4j-antora/aliases-redirects"
  - "@neo4j-antora/roles-labels"
  - "@neo4j-antora/table-footnotes"
  - "@neo4j-antora/xref-hash-validator"

asciidoc:
  extensions:
  - "@neo4j-documentation/remote-include"
  - "@neo4j-documentation/macros"
  - "@neo4j-antora/mark-terms"
  attributes:
    page-theme: docs
    page-type: Docs
    page-search-type: Docs
    page-search-site: Reference Docs
    page-canonical-root: /docs
    page-pagination: true
    page-no-canonical: true
    page-origin-private: false
    page-hide-toc: false
    page-mixpanel: 4bfb2414ab973c741b6f067bf06d5575
    page-terms-to-mark: Cypher
    includePDF: false
    nonhtmloutput: ""
    experimental: ''
    copyright: "2026 Neo4j, Inc."
    offset: '\\{offset}'
    count: '\\{count}'
    common-license-page-uri: https://neo4j.com/docs/license/
    docs-home: '/docs'
    neo4j-base-uri: '' # this attribute is empty for publish playbooks
    neo4j-docs-base-uri: /docs
    # User research promo
    # page-ad-overline-link: https://p.consentkit.com/baf41f1b-7816-4e04-82a7-b4c6d93ddf19/?ref=gsg-docs
    # page-ad-title: Join the User Research panel
    # page-ad-icon: chat-bubble-left-right
    # page-ad-description:  Influence the future of Neo4j products by sharing your experiences with a researcher.
    # page-ad-link: https://p.consentkit.com/baf41f1b-7816-4e04-82a7-b4c6d93ddf19/?ref=bloom-docs
    # page-ad-underline-role: button
    # page-ad-underline: Learn more
    # 
    # NODES AI 2026
    page-ad-overline-link: https://sessionize.com/nodesai2026/
    page-ad-image: "{neo4j-docs-base-uri}/assets/img/Nodes-AI-Color.png"
    page-ad-title: One Day of AI and Graphs on April 15, 2026
    page-ad-description: The Call for Papers is now open. Submit your talk by December 12, 2025
    page-ad-link: https://sessionize.com/nodesai2026/
    page-ad-underline-role: button
    page-ad-underline: Submit your talk
